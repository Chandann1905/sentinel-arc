name: Bug Report
description: Create a report to help us improve Sentinel Arc
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or Rust backtraces
      description: Please paste relevant logs here.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of Sentinel Arc are you running?
      placeholder: "e.g. v0.1.0"
    validations:
      required: true
